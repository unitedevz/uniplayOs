<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniplayOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #c8ff00;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wordmark {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .wordmark span {
      color: var(--accent);
    }

    .tagline {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .cta {
      margin-top: 3rem;
      display: inline-block;
      padding: 0.75rem 2rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }

    .cta:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .cta:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }

    @media (prefers-reduced-motion: reduce) {
      .cta { transition: none; }
    }
  </style>
</head>
<body>
  <h1 class="wordmark">Uniplay<span>OS</span></h1>
  <p class="tagline">Universal media player engine</p>
  <a class="cta" href="/player.html">Launch Player</a>
</body>
</html>
