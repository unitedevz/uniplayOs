<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player — UniplayOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1f1f1f;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #c8ff00;
      --ctrl-h: 48px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #wrapper {
      width: 100%;
      max-width: 960px;
      padding: 1rem;
    }

    #stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    #embed-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #play-big {
      width: 64px;
      height: 64px;
      border: 2px solid var(--accent);
      color: var(--accent);
      background: transparent;
      cursor: pointer;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      opacity: 0;
      transition: opacity 0.15s;
    }

    #stage.paused #play-big { opacity: 1; }

    #controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      padding: 0.5rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    #progress-wrap {
      position: relative;
      height: 4px;
      background: var(--border);
      cursor: pointer;
    }

    #progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      pointer-events: none;
    }

    #ctrl-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      height: var(--ctrl-h);
    }

    button {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      letter-spacing: 0.05em;
    }

    button:hover { color: var(--accent); }
    button:focus-visible { outline: 1px solid var(--accent); }

    #time {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    #vol-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-left: auto;
    }

    #vol {
      width: 70px;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #vol::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    #vol::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }

    #url-bar {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    #url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
      outline: none;
    }

    #url-input:focus { border-color: var(--accent); }

    #url-load {
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    #url-load:hover { background: var(--accent); color: var(--bg); }

    #status {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.5rem;
      min-height: 1rem;
    }

    @media (prefers-reduced-motion: reduce) {
      #play-big, button { transition: none; }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <div id="wrapper">
    <div id="stage" class="paused">
      <video id="video"></video>
      <iframe id="embed-frame" allowfullscreen allow="autoplay"></iframe>
      <div id="overlay">
        <button id="play-big" aria-label="Play"><i class="fa-solid fa-play"></i></button>
      </div>
    </div>

    <div id="controls">
      <div id="progress-wrap" role="slider" aria-label="Seek" tabindex="0">
        <div id="progress-fill"></div>
      </div>
      <div id="ctrl-row">
        <button id="btn-play" aria-label="Play/Pause"><i class="fa-solid fa-play"></i></button>
        <span id="time">0:00 / 0:00</span>
        <div id="vol-wrap">
          <button id="btn-mute" aria-label="Mute"><i class="fa-solid fa-volume-high"></i></button>
          <input id="vol" type="range" min="0" max="1" step="0.02" value="1" aria-label="Volume">
        </div>
        <button id="btn-fs" aria-label="Fullscreen"><i class="fa-solid fa-expand"></i></button>
      </div>
    </div>

    <div id="url-bar">
      <input id="url-input" type="url" placeholder="Paste a video URL…" spellcheck="false">
      <button id="url-load">Load</button>
    </div>

    <p id="status"></p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.4/dash.all.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/utils/utils.js"></script>
  <script src="/js/utils/resolver.js"></script>
  <script src="/js/utils/api.js"></script>

  <script>
    const video     = document.getElementById('video');
    const stage     = document.getElementById('stage');
    const btnPlay   = document.getElementById('btn-play');
    const playBig   = document.getElementById('play-big');
    const btnMute   = document.getElementById('btn-mute');
    const btnFs     = document.getElementById('btn-fs');
    const progress  = document.getElementById('progress-fill');
    const progWrap  = document.getElementById('progress-wrap');
    const timeEl    = document.getElementById('time');
    const volSlider = document.getElementById('vol');
    const urlInput  = document.getElementById('url-input');
    const urlLoad   = document.getElementById('url-load');
    const status    = document.getElementById('status');
    const embedFrame = document.getElementById('embed-frame');

    function setStatus(msg) { status.textContent = msg; }

    let hlsInstance  = null;
    let dashInstance = null;
    let ytPlayer     = null;
    let ytInterval   = null;
    let isYT         = false;

    function setIcon(btn, icon) {
      btn.querySelector('i').className = `fa-solid fa-${icon}`;
    }

    function showVideo() { video.style.display = 'block'; embedFrame.style.display = 'none'; }
    function showEmbed() { video.style.display = 'none';  embedFrame.style.display = 'block'; }

    function destroyInstances() {
      if (hlsInstance)  { hlsInstance.destroy();  hlsInstance  = null; }
      if (dashInstance) { dashInstance.reset();   dashInstance = null; }
      if (ytInterval)   { clearInterval(ytInterval); ytInterval = null; }
      if (ytPlayer)     { ytPlayer.destroy();     ytPlayer = null; }
      isYT = false;
    }

    function safePlay() {
      const p = video.play();
      if (p !== undefined) p.catch(() => {});
    }

    function extractYtId(url) {
      const match = url.match(/(?:v=|youtu\.be\/|shorts\/)([a-zA-Z0-9_-]{11})/);
      return match ? match[1] : null;
    }

    function loadYouTube(videoId) {
      isYT = true;
      showEmbed();
      embedFrame.id = 'yt-frame';

      if (ytPlayer) {
        ytPlayer.loadVideoById(videoId);
        return;
      }

      ytPlayer = new YT.Player('yt-frame', {
        videoId,
        playerVars: { autoplay: 1, controls: 0, rel: 0, modestbranding: 1 },
        events: {
          onReady: () => {
            setStatus('');
            ytInterval = setInterval(() => {
              if (!ytPlayer) return;
              const cur  = ytPlayer.getCurrentTime() || 0;
              const dur  = ytPlayer.getDuration()    || 0;
              const pct  = dur ? (cur / dur) * 100 : 0;
              progress.style.width = pct + '%';
              timeEl.textContent   = `${Utils.formatTime(cur)} / ${Utils.formatTime(dur)}`;
            }, 500);
          },
          onStateChange: (e) => {
            const S = YT.PlayerState;
            if (e.data === S.PLAYING) { stage.classList.remove('paused'); setIcon(btnPlay, 'pause'); setIcon(playBig, 'pause'); }
            if (e.data === S.PAUSED || e.data === S.ENDED) { stage.classList.add('paused'); setIcon(btnPlay, 'play'); setIcon(playBig, 'play'); }
          }
        }
      });
    }

    function loadUrl(rawUrl) {
      if (!rawUrl) return;
      destroyInstances();

      const resolver = new Resolver();
      const result   = resolver.resolve(rawUrl);
      const src      = result.proxyRequired ? resolver.getProxyUrl(rawUrl) : rawUrl;

      setStatus('Loading…');

      if (result.strategy === 'iframe') {
        if (Utils.isYouTube(rawUrl)) {
          const id = extractYtId(rawUrl);
          if (id) { loadYouTube(id); return; }
        }
        if (Utils.isVimeo(rawUrl)) {
          showEmbed();
          const match = rawUrl.match(/vimeo\.com\/(\d+)/);
          embedFrame.src = match ? `https://player.vimeo.com/video/${match[1]}?autoplay=1` : rawUrl;
          setStatus('');
          return;
        }
        showEmbed();
        embedFrame.src = rawUrl;
        setStatus('');
        return;
      }

      showVideo();

      if (result.type === 'hls') {
        if (Hls.isSupported()) {
          hlsInstance = new Hls();
          hlsInstance.loadSource(src);
          hlsInstance.attachMedia(video);
          hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { safePlay(); setStatus(''); });
          hlsInstance.on(Hls.Events.ERROR, (_, data) => { if (data.fatal) setStatus('Stream error.'); });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = src;
          safePlay();
          setStatus('');
        }
      } else if (result.type === 'dash') {
        dashInstance = dashjs.MediaPlayer().create();
        dashInstance.initialize(video, src, true);
        setStatus('');
      } else {
        video.src = src;
        safePlay();
        setStatus('');
      }
    }

    function togglePlay() {
      if (isYT && ytPlayer) {
        const state = ytPlayer.getPlayerState();
        if (state === YT.PlayerState.PLAYING) { ytPlayer.pauseVideo(); }
        else { ytPlayer.playVideo(); }
        return;
      }
      if (video.paused) { safePlay(); } else { video.pause(); }
    }

    video.addEventListener('play',  () => { stage.classList.remove('paused'); setIcon(btnPlay, 'pause'); setIcon(playBig, 'pause'); });
    video.addEventListener('pause', () => { stage.classList.add('paused');    setIcon(btnPlay, 'play');  setIcon(playBig, 'play');  });

    video.addEventListener('timeupdate', () => {
      if (!video.duration) return;
      const pct = (video.currentTime / video.duration) * 100;
      progress.style.width = pct + '%';
      timeEl.textContent = `${Utils.formatTime(video.currentTime)} / ${Utils.formatTime(video.duration)}`;
    });

    video.addEventListener('error', () => setStatus('Failed to load media.'));

    progWrap.addEventListener('click', e => {
      const rect = progWrap.getBoundingClientRect();
      const pct  = (e.clientX - rect.left) / rect.width;
      if (isYT && ytPlayer) {
        const dur = ytPlayer.getDuration();
        if (dur) ytPlayer.seekTo(pct * dur, true);
        return;
      }
      if (video.duration) video.currentTime = pct * video.duration;
    });

    btnPlay.addEventListener('click', togglePlay);
    playBig.addEventListener('click', togglePlay);

    btnMute.addEventListener('click', () => {
      if (isYT && ytPlayer) {
        if (ytPlayer.isMuted()) { ytPlayer.unMute(); setIcon(btnMute, 'volume-high'); }
        else { ytPlayer.mute(); setIcon(btnMute, 'volume-xmark'); }
        return;
      }
      video.muted = !video.muted;
      setIcon(btnMute, video.muted ? 'volume-xmark' : 'volume-high');
    });

    volSlider.addEventListener('input', () => {
      const val = parseFloat(volSlider.value);
      if (isYT && ytPlayer) { ytPlayer.setVolume(val * 100); return; }
      video.volume = val;
    });

    btnFs.addEventListener('click', () => {
      if (!document.fullscreenElement) stage.requestFullscreen();
      else document.exitFullscreen();
    });

    urlLoad.addEventListener('click', () => loadUrl(urlInput.value.trim()));
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadUrl(urlInput.value.trim()); });

    const params = new URLSearchParams(window.location.search);
    const autoUrl = params.get('url');
    if (autoUrl) { urlInput.value = autoUrl; loadUrl(autoUrl); }
  </script>
