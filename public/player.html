<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UniplayOS · native player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1f1f1f;
      --text: #e8e8e8;
      --muted: #777;
      --accent: #c8ff00;
      --ctrl-h: 48px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
    }

    #wrapper {
      width: 100%;
      max-width: 1200px;
      height: 100%;
      max-height: 900px;
      background: var(--bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
    }

    #stage {
      position: relative;
      width: 100%;
      background: #000;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 16 / 9;
    }

    #stage video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    #stage #embed-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      object-fit: contain;
    }

    #loader {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(2px);
      z-index: 20;
      pointer-events: none;
    }
    #loader.active {
      display: flex;
    }

    .uniplayos-spinner {
      width: 64px;
      height: 64px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .uniplayos-spinner .ring {
      position: absolute;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top-color: var(--accent);
      border-bottom-color: var(--accent);
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      will-change: transform;
    }

    .uniplayos-spinner .ring:nth-child(1) {
      width: 64px;
      height: 64px;
      animation-duration: 1.2s;
      border-width: 4px;
    }
    .uniplayos-spinner .ring:nth-child(2) {
      width: 44px;
      height: 44px;
      animation-duration: 0.9s;
      border-width: 3px;
      border-top-color: #fff;
      border-bottom-color: #fff;
    }
    .uniplayos-spinner .ring:nth-child(3) {
      width: 24px;
      height: 24px;
      animation-duration: 0.6s;
      border-width: 3px;
      border-top-color: var(--accent);
      border-bottom-color: var(--accent);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #play-big {
      width: 70px;
      height: 70px;
      border: 2px solid var(--accent);
      color: var(--accent);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      cursor: pointer;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      transform: scale(0.9);
    }

    #stage.paused #play-big {
      opacity: 1;
      transform: scale(1);
    }

    #controls {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0.5rem 0.75rem 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    #progress-wrap {
      position: relative;
      height: 5px;
      background: var(--border);
      cursor: pointer;
      border-radius: 4px;
      transition: height 0.1s;
      display: flex;
      align-items: center;
    }

    #progress-wrap:hover {
      height: 7px;
    }

    #progress-wrap input[type="range"] {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
      margin: 0;
      padding: 0;
      top: 0;
      left: 0;
      z-index: 2;
    }

    #progress-wrap input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(200, 255, 0, 0.3);
      transition: transform 0.15s;
      margin-top: -4.5px;
    }

    #progress-wrap input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    #progress-wrap input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(200, 255, 0, 0.3);
    }

    #progress-wrap input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
    }

    #progress-wrap input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
    }

    #progress-wrap input[type="range"]::-moz-range-track {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
    }

    #progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: var(--accent);
      width: 0%;
      pointer-events: none;
      border-radius: 4px;
      z-index: 1;
    }

    #ctrl-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      height: var(--ctrl-h);
      flex-wrap: nowrap;
      width: 100%;
    }

    button {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.25rem 0.4rem;
      letter-spacing: 0.03em;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    button:hover { color: var(--accent); }
    button:focus-visible { outline: 1px solid var(--accent); }

    #time {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      min-width: 90px;
      flex-shrink: 0;
    }

    .spacer {
      flex: 1;
      min-width: 4px;
    }

    #vol {
      width: 60px;
      accent-color: var(--accent);
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #debug-bar {
      display: none;
      padding: 0.5rem 0.75rem 0.75rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    #debug-bar.visible {
      display: flex;
    }

    #debug-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      border-radius: 6px;
      min-width: 150px;
    }

    #debug-bar input:focus {
      border-color: var(--accent);
    }

    #debug-bar button {
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.5rem 1.2rem;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      transition: 0.15s;
      font-family: inherit;
    }

    #debug-bar button:hover {
      background: var(--accent);
      color: var(--bg);
    }

    #status {
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0.25rem 0.75rem 0.5rem;
      background: var(--surface);
      min-height: 1.6rem;
      border-top: 1px solid var(--border);
      font-family: monospace;
      display: none;
      flex-shrink: 0;
    }

    #status.visible {
      display: block;
    }

    #stage.fullscreen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      background: #000;
      z-index: 9999;
      aspect-ratio: auto !important;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 0;
    }

    #stage.fullscreen video {
      object-fit: contain;
      width: 100vw;
      height: 100vh;
    }

    #stage.fullscreen #controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.1);
      width: 100%;
    }

    #stage.fullscreen #ctrl-row {
      width: 100%;
      flex-wrap: nowrap;
      gap: 0.5rem;
    }

    #stage.fullscreen #debug-bar,
    #stage.fullscreen #status {
      display: none !important;
    }

    @media (min-width: 1024px) {
      #wrapper {
        max-height: 900px;
        height: 90vh;
      }
      #stage {
        aspect-ratio: 16 / 9;
        flex: 1;
        min-height: 0;
      }
      #ctrl-row {
        gap: 0.75rem;
      }
      button {
        font-size: 1.1rem;
        padding: 0.3rem 0.6rem;
      }
      #time {
        font-size: 0.9rem;
        min-width: 100px;
      }
      #vol {
        width: 80px;
      }
      #play-big {
        width: 80px;
        height: 80px;
        font-size: 2rem;
      }
    }

    @media (max-width: 768px) {
      #wrapper {
        max-height: 100vh;
        height: 100%;
        border-radius: 0;
      }
      #stage {
        aspect-ratio: 16 / 9;
      }
    }

    @media (max-width: 600px) {
      #ctrl-row { gap: 0.3rem; }
      #vol { width: 45px; }
      #time { font-size: 0.7rem; min-width: 75px; }
      #play-big { width: 56px; height: 56px; font-size: 1.4rem; }
      #progress-wrap input[type="range"]::-webkit-slider-thumb {
        width: 16px;
        height: 16px;
        margin-top: -5.5px;
      }
      #progress-wrap input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
      }
      #debug-bar {
        padding: 0.4rem 0.5rem 0.6rem;
      }
      #debug-bar input {
        font-size: 0.7rem;
        padding: 0.4rem 0.6rem;
      }
      #debug-bar button {
        padding: 0.4rem 0.8rem;
        font-size: 0.7rem;
      }
    }

    @media (max-width: 480px) {
      #progress-wrap input[type="range"]::-webkit-slider-thumb {
        width: 14px;
        height: 14px;
        margin-top: -4.5px;
      }
      #progress-wrap input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
      }
    }
    
    @media (orientation: landscape) and (max-height: 500px) {
      #stage.fullscreen #ctrl-row {
        gap: 0.2rem;
      }
      #stage.fullscreen #time {
        min-width: 60px;
        font-size: 0.65rem;
      }
      #stage.fullscreen #vol {
        width: 40px;
      }
      #stage.fullscreen button {
        font-size: 0.8rem;
        padding: 0.2rem 0.3rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>

<div id="wrapper">
  <div id="stage" class="paused">
    <video id="video" playsinline></video>
    <iframe id="embed-frame" allowfullscreen allow="autoplay"></iframe>

    <div id="loader">
      <div class="uniplayos-spinner">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
    </div>

    <div id="overlay">
      <button id="play-big" aria-label="Play"><i class="fa-solid fa-play"></i></button>
    </div>
  </div>

  <div id="controls">
    <div id="progress-wrap" role="slider" aria-label="Seek" tabindex="0">
      <div id="progress-fill"></div>
      <input type="range" id="seek-slider" min="0" max="100" value="0" step="0.01" aria-label="Seek">
    </div>
    <div id="ctrl-row">
      <button id="btn-play" aria-label="Play/Pause"><i class="fa-solid fa-play"></i></button>
      <button id="btn-rewind" aria-label="Rewind 10s"><i class="fa-solid fa-backward-step"></i></button>
      <button id="btn-forward" aria-label="Forward 10s"><i class="fa-solid fa-forward-step"></i></button>
      <span id="time">0:00 / 0:00</span>
      
      <div class="spacer"></div>
      
      <button id="btn-mute" aria-label="Mute"><i class="fa-solid fa-volume-high"></i></button>
      <input id="vol" type="range" min="0" max="1" step="0.02" value="1" aria-label="Volume">
      <button id="btn-fs" aria-label="Fullscreen"><i class="fa-solid fa-expand"></i></button>
    </div>
  </div>

  <div id="debug-bar">
    <input id="url-input" type="url" placeholder="Paste video URL (MP4, HLS, DASH, YouTube…)" spellcheck="false">
    <button id="url-load">Load</button>
  </div>
  <div id="status">Ready</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.4/dash.all.min.js"></script>
<script src="/js/utils/utils.js"></script>
<script src="/js/utils/resolver.js"></script>
<script src="/js/utils/api.js"></script>

<script>
  (function() {
    const video = document.getElementById('video');
    const stage = document.getElementById('stage');
    const embedFrame = document.getElementById('embed-frame');
    const btnPlay = document.getElementById('btn-play');
    const btnRewind = document.getElementById('btn-rewind');
    const btnForward = document.getElementById('btn-forward');
    const playBig = document.getElementById('play-big');
    const btnMute = document.getElementById('btn-mute');
    const btnFs = document.getElementById('btn-fs');
    const progress = document.getElementById('progress-fill');
    const progWrap = document.getElementById('progress-wrap');
    const seekSlider = document.getElementById('seek-slider');
    const timeEl = document.getElementById('time');
    const volSlider = document.getElementById('vol');
    const urlInput = document.getElementById('url-input');
    const urlLoad = document.getElementById('url-load');
    const status = document.getElementById('status');
    const debugBar = document.getElementById('debug-bar');
    const loader = document.getElementById('loader');

    let hlsInstance = null;
    let dashInstance = null;
    let isReadySent = false;
    let isSeeking = false;
    let isDebugMode = false;
    let loadTimeout = null;
    let waitingTimeout = null;

    function showLoader(show) {
      loader.classList.toggle('active', show);
    }

    function setStatus(msg) {
      status.textContent = msg;
      status.classList.toggle('visible', !!msg && isDebugMode);
    }

    function sendEmbedEvent(action, payload = {}) {
      window.parent.postMessage({ type: 'uniplayos', action, ...payload }, '*');
    }

    function sendReadyIfNeeded() {
      if (!isReadySent) {
        isReadySent = true;
        sendEmbedEvent('ready');
      }
    }

    function updateAspectRatio() {
      if (!video.videoWidth || !video.videoHeight) return;
      const w = video.videoWidth;
      const h = video.videoHeight;
      stage.style.aspectRatio = `${w} / ${h}`;
    }

    function destroyInstances() {
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      if (dashInstance) { dashInstance.reset(); dashInstance = null; }
    }

    function showVideo() {
      video.style.display = 'block';
      embedFrame.style.display = 'none';
    }
    function showEmbed() {
      video.style.display = 'none';
      embedFrame.style.display = 'block';
    }

    function safePlay() {
      const p = video.play();
      if (p !== undefined) p.catch(() => {});
    }

    function getEmbedUrl(url) {
      if (Utils.isYouTube(url)) {
        const match = url.match(/(?:v=|youtu\.be\/|shorts\/)([a-zA-Z0-9_-]{11})/);
        return match ? `https://www.youtube.com/embed/${match[1]}?autoplay=1&enablejsapi=1` : url;
      }
      if (Utils.isVimeo(url)) {
        const match = url.match(/vimeo\.com\/(\d+)/);
        return match ? `https://player.vimeo.com/video/${match[1]}?autoplay=1` : url;
      }
      return url;
    }

    function loadUrl(rawUrl, autoplay = false) {
      if (!rawUrl) return;
      destroyInstances();
      isReadySent = false;
      showLoader(true);

      if (loadTimeout) clearTimeout(loadTimeout);
      loadTimeout = setTimeout(() => {
        if (loader.classList.contains('active')) {
          if (isDebugMode) setStatus('Loading is taking longer than expected...');
        }
      }, 3000);

      try {
        const resolver = new Resolver();
        const result = resolver.resolve(rawUrl);
        const src = result.proxyRequired ? resolver.getProxyUrl(rawUrl) : rawUrl;

        if (isDebugMode) setStatus('Loading…');

        if (result.strategy === 'iframe') {
          showEmbed();
          embedFrame.src = getEmbedUrl(rawUrl);
          if (isDebugMode) setStatus('');
          stage.style.aspectRatio = '16 / 9';
          sendReadyIfNeeded();
          showLoader(false);
          if (loadTimeout) clearTimeout(loadTimeout);
          if (autoplay) { }
          return;
        }

        showVideo();
        stage.style.aspectRatio = '16 / 9';

        const onMediaReady = () => {
          showLoader(false);
          if (loadTimeout) clearTimeout(loadTimeout);
          if (isDebugMode) setStatus('');
          updateAspectRatio();
          sendReadyIfNeeded();
          if (autoplay) safePlay();
        };

        const onError = (msg) => {
          showLoader(false);
          if (loadTimeout) clearTimeout(loadTimeout);
          if (isDebugMode) setStatus(msg || 'Failed to load media.');
          sendEmbedEvent('error', { message: msg || 'Media error' });
        };

        if (result.type === 'hls') {
          if (Hls.isSupported()) {
            hlsInstance = new Hls();
            hlsInstance.loadSource(src);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, onMediaReady);
            hlsInstance.on(Hls.Events.ERROR, (_, data) => {
              if (data.fatal) {
                onError('HLS fatal error');
              }
            });
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = src;
            video.addEventListener('loadedmetadata', onMediaReady, { once: true });
            video.addEventListener('error', () => onError('Failed to load HLS stream'), { once: true });
            if (autoplay) safePlay();
          } else {
            onError('HLS not supported');
          }
        } else if (result.type === 'dash') {
          dashInstance = dashjs.MediaPlayer().create();
          dashInstance.initialize(video, src, true);
          dashInstance.on('streamInitialized', onMediaReady);
          dashInstance.on('streamError', () => onError('DASH stream error'));
        } else {
          video.src = src;
          video.addEventListener('loadedmetadata', onMediaReady, { once: true });
          video.addEventListener('error', () => onError('Failed to load media'), { once: true });
          if (autoplay) safePlay();
        }
      } catch (err) {
        showLoader(false);
        if (loadTimeout) clearTimeout(loadTimeout);
        if (isDebugMode) setStatus('Invalid URL');
        console.error('Resolver error:', err);
      }
    }

    function togglePlay() {
      if (video.paused) safePlay(); else video.pause();
    }

    function setIcon(btn, icon) {
      const i = btn.querySelector('i');
      if (i) i.className = `fa-solid fa-${icon}`;
    }

    function setDebugMode(enabled) {
      isDebugMode = enabled;
      debugBar.classList.toggle('visible', enabled);
      status.classList.toggle('visible', enabled && status.textContent);
      if (!enabled) setStatus('');
    }

    video.addEventListener('loadedmetadata', () => {
      updateAspectRatio();
      sendReadyIfNeeded();
      showLoader(false);
      if (loadTimeout) clearTimeout(loadTimeout);
    });

    video.addEventListener('play', () => {
      stage.classList.remove('paused');
      setIcon(btnPlay, 'pause');
      setIcon(playBig, 'pause');
      sendEmbedEvent('play');
    });
    video.addEventListener('pause', () => {
      stage.classList.add('paused');
      setIcon(btnPlay, 'play');
      setIcon(playBig, 'play');
      sendEmbedEvent('pause');
    });
    video.addEventListener('ended', () => sendEmbedEvent('ended'));
    video.addEventListener('error', () => {
      showLoader(false);
      if (loadTimeout) clearTimeout(loadTimeout);
      if (isDebugMode) setStatus('Failed to load media.');
      sendEmbedEvent('error', { message: 'Video error' });
    });

    video.addEventListener('waiting', () => {
      if (!video.paused) {
        showLoader(true);
        if (waitingTimeout) clearTimeout(waitingTimeout);
        waitingTimeout = setTimeout(() => {
          if (loader.classList.contains('active')) {
            if (isDebugMode) setStatus('Buffering...');
          }
        }, 500);
      }
    });

    video.addEventListener('playing', () => {
      showLoader(false);
      if (waitingTimeout) clearTimeout(waitingTimeout);
      if (isDebugMode) setStatus('');
    });

    video.addEventListener('canplay', () => {
      showLoader(false);
      if (waitingTimeout) clearTimeout(waitingTimeout);
      if (isDebugMode) setStatus('');
    });

    video.addEventListener('timeupdate', () => {
      if (!video.duration) return;
      const pct = (video.currentTime / video.duration) * 100;
      progress.style.width = pct + '%';
      if (!isSeeking) {
        seekSlider.value = pct;
      }
      timeEl.textContent = `${Utils.formatTime(video.currentTime)} / ${Utils.formatTime(video.duration)}`;
      sendEmbedEvent('timeupdate', { currentTime: video.currentTime, duration: video.duration });
    });

    seekSlider.addEventListener('input', (e) => {
      isSeeking = true;
      const pct = parseFloat(e.target.value);
      progress.style.width = pct + '%';
      if (video.duration) {
        const time = (pct / 100) * video.duration;
        timeEl.textContent = `${Utils.formatTime(time)} / ${Utils.formatTime(video.duration)}`;
      }
    });

    seekSlider.addEventListener('change', (e) => {
      isSeeking = false;
      const pct = parseFloat(e.target.value);
      if (video.duration) {
        video.currentTime = (pct / 100) * video.duration;
        showLoader(true);
      }
    });

    btnPlay.addEventListener('click', togglePlay);
    playBig.addEventListener('click', togglePlay);
    
    btnRewind.addEventListener('click', () => {
      video.currentTime = Math.max(0, video.currentTime - 10);
      if (!video.paused) showLoader(true);
    });
    
    btnForward.addEventListener('click', () => {
      video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
      if (!video.paused) showLoader(true);
    });

    btnMute.addEventListener('click', () => {
      video.muted = !video.muted;
      setIcon(btnMute, video.muted ? 'volume-xmark' : 'volume-high');
    });
    volSlider.addEventListener('input', () => { video.volume = volSlider.value; });

    btnFs.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        stage.classList.add('fullscreen');
        if (stage.requestFullscreen) {
          stage.requestFullscreen().catch(() => {});
        }
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        stage.classList.remove('fullscreen');
        updateAspectRatio();
      } else {
        stage.classList.add('fullscreen');
      }
    });

    urlLoad.addEventListener('click', () => loadUrl(urlInput.value.trim()));
    urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadUrl(urlInput.value.trim()); });

    const params = new URLSearchParams(window.location.search);
    const sourceParam = params.get('source') || params.get('url');
    const autoplayParam = params.get('autoplay') === 'true';
    const debugParam = params.get('debug') === 'true';

    if (debugParam || params.get('debug') === '') {
      setDebugMode(true);
    }

    if (sourceParam) {
      urlInput.value = sourceParam;
      loadUrl(sourceParam, autoplayParam);
    } else {
      setTimeout(() => {
        sendReadyIfNeeded();
        showLoader(false);
      }, 300);
      if (!debugParam) setStatus('');
    }

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || data.type !== 'uniplayos') return;
      switch (data.action) {
        case 'play': safePlay(); break;
        case 'pause': video.pause(); break;
        case 'togglePlay': togglePlay(); break;
        case 'seek': if (data.time !== undefined) {
          video.currentTime = data.time;
          if (!video.paused) showLoader(true);
        } break;
        case 'setVolume':
          if (data.level !== undefined) {
            const v = Math.max(0, Math.min(1, data.level));
            video.volume = v; volSlider.value = v;
          }
          break;
        case 'toggleMute':
          video.muted = !video.muted;
          setIcon(btnMute, video.muted ? 'volume-xmark' : 'volume-high');
          break;
        case 'toggleFullscreen':
          if (!document.fullscreenElement) {
            stage.classList.add('fullscreen');
            if (stage.requestFullscreen) stage.requestFullscreen().catch(() => {});
          } else {
            if (document.exitFullscreen) document.exitFullscreen();
          }
          break;
        case 'load': if (data.source) loadUrl(data.source, false); break;
        case 'destroy':
          destroyInstances();
          video.pause();
          video.src = '';
          embedFrame.src = '';
          showLoader(false);
          if (loadTimeout) clearTimeout(loadTimeout);
          if (waitingTimeout) clearTimeout(waitingTimeout);
          break;
        case 'setDebug':
          setDebugMode(data.enabled === true);
          break;
        default: break;
      }
    });
  })();
</script>
</body>
  </html>
